<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#F7931E"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Pot body -->
  <ellipse cx="256" cy="310" rx="140" ry="90" fill="#fff" opacity="0.95"/>
  <rect x="116" y="240" width="280" height="70" rx="8" fill="#fff" opacity="0.95"/>
  <!-- Pot lid -->
  <ellipse cx="256" cy="235" rx="150" ry="30" fill="#f0f0f0" stroke="#ddd" stroke-width="3"/>
  <rect x="236" y="205" width="40" height="20" rx="10" fill="#e0e0e0" stroke="#ccc" stroke-width="2"/>
  <!-- Handles -->
  <rect x="80" y="270" width="36" height="18" rx="9" fill="#e8e8e8" stroke="#ccc" stroke-width="2"/>
  <rect x="396" y="270" width="36" height="18" rx="9" fill="#e8e8e8" stroke="#ccc" stroke-width="2"/>
  <!-- Steam lines -->
  <path d="M200 190 Q195 165 205 140" stroke="#fff" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M256 180 Q251 150 261 120" stroke="#fff" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M312 190 Q307 165 317 140" stroke="#fff" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Digital display (Hotcook-like) -->
  <rect x="216" y="300" width="80" height="35" rx="5" fill="#333"/>
  <text x="256" y="324" text-anchor="middle" font-family="monospace" font-size="18" fill="#4ADE80">menu</text>
  <!-- Button -->
  <circle cx="256" cy="365" r="12" fill="#e53e3e" stroke="#c53030" stroke-width="2"/>
</svg>
